<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Portfolio</title>
    <style>
        body {
            background-color: #0f0f11;
            color: #e4e4e7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .main-card {
            background: #18181b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            border: 1px solid #27272a;
        }
        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        p {
            color: #a1a1aa;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background-color: #5865F2; /* Modern Blue */
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover {
            background-color: #4752c4;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>Welcome! 👋</h1>
        <p>This is my official development space where I build open-source scripts, custom software layouts, and server management networks.</p>
        
        <a href="bots.html" class="btn">Go to bots page</a>
    </div>

</body>
</html>
