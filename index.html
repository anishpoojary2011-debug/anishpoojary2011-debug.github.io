<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anish - Discord Portfolio</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        .protocol {
            color: #00ea8c;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        h1 {
            color: #ffffff;
            font-size: 42px;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }
        h2 {
            color: #8b949e;
            font-size: 20px;
            margin: 0 0 30px 0;
            text-transform: uppercase;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #8b949e;
            margin-bottom: 40px;
        }
        .highlight {
            color: #00ea8c;
        }
        .btn-primary {
            display: block;
            background-color: #008f53;
            color: #ffffff;
            text-align: center;
            padding: 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        .btn-secondary {
            display: block;
            background-color: transparent;
            color: #8b949e;
            text-align: center;
            padding: 15px;
            text-decoration: none;
            font-size: 16px;
            letter-spacing: 2px;
            border: 1px solid #21262d;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="protocol">// INITIALIZING USER PROTOCOL</div>
        
        <h1>ANISH</h1> 
        <h2>DISCORD SERVER MANAGER</h2>
        
        <p>
            Community Builder & Server Manager. 
            3+ years building structured, disciplined, and thriving online communities. 
            Current status: <span class="highlight">actively managing</span>.
        </p>

        <a href="#" class="btn-primary">VIEW EXPERIENCE &rarr;</a>
        <a href="#" class="btn-secondary">CONTACT ME</a>
    </div>

</body>
</html>
