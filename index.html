<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anish | Portfolio Gateway</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        
        :root {
            --bg: #0b0f12;
            --text: #cbd5e1;
            --matrix-green: #00ff66;
            --prompt-color: #64748b;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Fira Code', monospace;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* --- BOOT LOADING SCREEN STYLES --- */
        #boot-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .boot-container {
            width: 85%;
            max-width: 450px;
        }

        .boot-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: #475569;
        }

        .progress-bar-container {
            width: 100%;
            height: 4px;
            background-color: #1e293b;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: var(--matrix-green);
            box-shadow: 0 0 8px var(--matrix-green);
            animation: load 2.5s cubic-bezier(0.1, 0.6, 0.4, 1) forwards;
        }

        .status-msg {
            color: var(--matrix-green);
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 40px;
            font-weight: bold;
            text-shadow: 0 0 5px var(--matrix-green);
        }

        .system-checks {
            font-size: 0.85rem;
            color: #64748b;
            line-height: 2;
        }

        .check-item {
            display: flex;
            justify-content: space-between;
        }

        .check-ok {
            color: var(--matrix-green);
        }

        @keyframes load {
            0% { width: 0%; }
            50% { width: 45%; }
            70% { width: 75%; }
            100% { width: 100%; }
        }

        /* --- TERMINAL INTERFACE STYLES --- */
        #main-terminal {
            display: none;
            width: 100%;
            height: 100%;
            padding: 20px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .terminal-container {
            width: 100%;
            max-width: 700px;
            margin: 20px auto 0 auto;
        }

        .welcome-text {
            color: var(--matrix-green);
            text-shadow: 0 0 5px var(--matrix-green);
            margin-bottom: 20px;
            line-height: 1.4;
            white-space: pre-wrap;
            border: 2px solid var(--matrix-green);
            padding: 15px;
            box-shadow: inset 0 0 10px rgba(0, 255, 102, 0.1), 0 0 10px rgba(0, 255, 102, 0.1);
        }

        .output-history {
            white-space: pre-wrap;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .terminal-input-line {
            display: flex;
            align-items: center;
            width: 100%;
            padding-bottom: 50px; /* Space for mobile keyboard layout */
        }

        .prompt {
            color: var(--prompt-color);
            margin-right: 10px;
            white-space: nowrap;
        }

        #terminal-typer {
            background: transparent;
            border: none;
            outline: none;
            color: var(--matrix-green);
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
            width: 100%;
            text-shadow: 0 0 5px var(--matrix-green);
        }

        .command-response {
            color: #ffffff;
            margin-bottom: 15px;
        }
        
        .blue-text { color: #38bdf8; }
        .yellow-text { color: #f59e0b; }
        .red-text { color: #ef4444; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div class="boot-container">
            <div class="boot-header">
                <span>SYSTEM BOOT</span>
                <span>v2.8.0</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar"></div>
            </div>
            <div class="status-msg">COMPILING ASSETS...</div>
            
            <div class="system-checks">
                <div class="check-item">
                    <span>> Memory check</span>
                    <span class="check-ok">OK</span>
                </div>
                <div class="check-item">
                    <span>> Loading modules</span>
                    <span class="check-ok">DONE</span>
                </div>
            </div>
        </div>
    </div>

    <div id="main-terminal">
        <div class="terminal-container">
            <div id="banner-view" class="welcome-text">📊 ANISH PORTFOLIO SYSTEM [Version 3.0.0]
🔒 STATUS: SECURE_
💡 Type 'help' to view available commands.</div>

            <div id="history" class="output-history"></div>

            <div class="terminal-input-line">
                <span class="prompt">guest@anish_terminal:~$</span>
                <input type="text" id="terminal-typer" autofocus autocomplete="off" placeholder="Type here...">
            </div>
        </div>
    </div>

    <script>
        const bootScreen = document.getElementById('boot-screen');
        const mainTerminal = document.getElementById('main-terminal');
        const typer = document.getElementById('terminal-typer');
        const history = document.getElementById('history');
        const bannerView = document.getElementById('banner-view');

        // Transition content after loader finishes
        setTimeout(() => {
            bootScreen.style.opacity = '0';
            setTimeout(() => {
                bootScreen.style.display = 'none';
                mainTerminal.style.display = 'block';
                document.body.style.overflow = 'auto';
                typer.focus();
            }, 500);
        }, 2800);

        // Extended Command Registry
        const commands = {
            help: `Available Commands:\n  <span class="blue-text">about</span>    - Learn more about me\n  <span class="blue-text">skills</span>   - View my technical skill set\n  <span class="blue-text">projects</span> - See my active work\n  <span class="blue-text">socials</span>  - Get my networking profiles\n  <span class="blue-text">whoami</span>   - Display current terminal session info\n  <span class="blue-text">date</span>     - Show current date & time\n  <span class="blue-text">banner</span>   - Display welcome matrix box\n  <span class="blue-text">matrix</span>   - Secret system message\n  <span class="blue-text">connect</span>  - Jump straight to my Discord server\n  <span class="blue-text">clear</span>    - Clear the terminal screen`,
            about: `ABOUT ME:\nI am a <span class="yellow-text">Discord Server Manager</span> and Community Builder. I specialize in setting up secure backend systems, automation bots, and moderation workflows.`,
            skills: `TECHNICAL SKILLS:\n- Community Management & Moderation\n- Discord API & Advanced Bot Integrations\n- Linux Operations (Termux / Kali Linux)\n- Frontend Web Development (HTML / CSS)`,
            projects: `ACTIVE PROJECTS:\n- <span class="yellow-text">Community Server Gateway</span>: Active management, bot routing, and custom roles.\n- <span class="yellow-text">Personal Portfolio</span>: Built directly from a mobile device container.`,
            socials: `SOCIAL CHANNELS:\n- <span class="yellow-text">Discord</span>: @anish (Use 'connect' to join my server)\n- <span class="yellow-text">GitHub</span>: anishpoojary2011-debug`,
            whoami: `SESSION INFO:\nUser: guest\nHost: anish_terminal\nPrivileges: Standard User\nEnvironment: Termux Core Web Shell`,
            date: `CURRENT DATE & TIME:\n${new Date().toString()}`,
            matrix: `<span class="red-text">"Wake up, Neo... The Matrix has you..."</span>\nEverything you see here was built using code commands on a mobile terminal setup.`,
            banner: `📊 ANISH PORTFOLIO SYSTEM [Version 3.0.0]\n🔒 STATUS: SECURE_\n💡 Type 'help' to view available commands.`
        };

        typer.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                const input = typer.value.trim().toLowerCase();
                if (input === '') return;

                let response = '';
                
                if (input === 'clear') {
                    history.innerHTML = '';
                    typer.value = '';
                    return;
                } else if (input === 'connect' || input === 'discord') {
                    history.innerHTML += `<div><span class="prompt">guest@anish_terminal:~$</span> ${typer.value}</div>`;
                    history.innerHTML += `<div class="command-response">🔗 Redirecting to Discord Server...</div>`;
                    window.location.href = "https://discord.gg/wwqtGYu7q";
                    typer.value = '';
                    return;
                } else if (commands[input]) {
                    response = commands[input];
                } else {
                    response = `<span class="red-text">Command not found: '${input}'. Type 'help' for available commands.</span>`;
                }

                history.innerHTML += `<div><span class="prompt">guest@anish_terminal:~$</span> ${typer.value}</div>`;
                history.innerHTML += `<div class="command-response">${response}</div>`;
                
                typer.value = '';
                
                // Automatically auto-scroll to the bottom input line
                setTimeout(() => {
                    mainTerminal.scrollTop = mainTerminal.scrollHeight;
                }, 10);
            }
        });
    </script>
</body>
</html>
