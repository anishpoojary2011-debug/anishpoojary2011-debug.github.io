<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>anish@production-node:~</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg: #02040a;
            --panel: #070d19;
            --panel-inner: #040710;
            --border: #1e293b;
            --cyan: #0ea5e9;
            --purple: #a855f7;
            --green: #10b981;
            --orange: #f97316;
            --red: #ef4444;
            --text: #f8fafc;
            --text-dim: #64748b;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .status-header-bar {
            width: 100%; height: 40px;
            background: #040812;
            border-bottom: 1px solid var(--border);
            position: fixed; top: 0; left: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 12px; font-size: 0.72rem; font-family: 'Fira Code', monospace;
            color: var(--text-dim); box-sizing: border-box;
        }

        .status-indicator {
            display: flex; align-items: center; gap: 6px;
        }

        .pulse-dot-orange {
            width: 8px; height: 8px;
            background-color: var(--orange);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--orange);
        }

        .workspace-grid {
            width: 100%;
            max-width: 1200px;
            margin: 50px auto 0 auto;
            padding: 12px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        @media(min-width: 900px) {
            .workspace-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .panel-box {
            background: rgba(7, 13, 25, 0.95);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-tab-bar {
            background: #040812;
            padding: 0 12px;
            height: 34px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .tab-pill {
            color: var(--cyan);
            font-family: 'Fira Code', monospace;
            font-size: 0.72rem;
            font-weight: 500;
        }

        .terminal-viewport {
            padding: 14px;
            min-height: 240px;
            background: var(--panel-inner);
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            box-sizing: border-box;
        }

        .terminal-log-output {
            color: #cbd5e1;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .input-row {
            display: flex;
            align-items: center;
            width: 100%;
            margin-top: 8px;
        }

        .terminal-prompt-tag {
            color: var(--purple);
            font-weight: bold;
            margin-right: 6px;
        }

        .terminal-input-field {
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            width: 100%;
        }

        .telemetry-stack {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--panel-inner);
            box-sizing: border-box;
        }

        .chart-card {
            background: rgba(3, 7, 18, 0.6);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
        }

        .chart-header-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            font-family: 'Fira Code', monospace;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .value-badge { font-weight: 700; }

        .svg-container-frame {
            width: 100%;
            height: 75px;
            background: #020409;
            border-radius: 4px;
            border: 1px solid rgba(30, 41, 59, 0.5);
        }

        .svg-globe-container-frame {
            width: 100%;
            height: 140px;
            background: #020409;
            border-radius: 4px;
            border: 1px solid rgba(30, 41, 59, 0.5);
        }

        .realtime-sys-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .mini-stat-node {
            background: rgba(7, 13, 25, 0.4);
            border: 1px solid rgba(30, 41, 59, 0.4);
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 0.68rem;
            font-family: 'Fira Code', monospace;
            display: flex;
            justify-content: space-between;
        }

        @keyframes sweep {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .radar-line {
            transform-origin: 100px 70px;
            animation: sweep 4s linear infinite;
        }

        .c-cyan { color: var(--cyan); }
        .c-purple { color: var(--purple); }
        .c-green { color: var(--green); }
        .c-orange { color: var(--orange); }
        .c-red { color: var(--red); }
        .c-dim { color: var(--text-dim); }
    </style>
</head>
<body>

    <div class="status-header-bar">
        <div class="status-indicator">
            <span class="pulse-dot-orange"></span>
            <span>NODE: <span class="c-cyan">guard_011</span></span>
        </div>
        <span id="system-clock-panel">00:00:00 PM</span>
    </div>

    <div class="workspace-grid">
        <div class="panel-box">
            <div class="panel-tab-bar"><div class="tab-pill">bash_terminal.sh</div></div>
            <div class="terminal-viewport">

                <div class="input-row">
                    <span class="terminal-prompt-tag">anish@gateway:~$</span>
                    <input type="text" class="terminal-input-field" id="console-terminal-typer" autofocus autocomplete="off">
                </div>
            </div>
        </div>

        <div class="panel-box">

            <div class="telemetry-stack">
                
                <div class="chart-card">

                            <line x1="100" y1="5" x2="100" y2="135" stroke="rgba(30, 41, 59, 0.4)" />
                            <line x1="20" y1="70" x2="180" y2="70" stroke="rgba(30, 41, 59, 0.4)" />
                            <line x1="100" y1="70" x2="100" y2="15" stroke="var(--cyan)" stroke-width="1.5" class="radar-line" />
                            <circle cx="70" cy="50" r="3" fill="var(--red)" />
                            <circle cx="130" cy="90" r="3" fill="var(--orange)" />
                        </svg>
                    </div>
                </div>

                <div class="realtime-sys-grid">
                    <div class="mini-stat-node"><span>CPU:</span><span class="c-green" id="stat-cpu">12.4%</span></div>
                    <div class="mini-stat-node"><span>PACKETS:</span><span class="c-cyan" id="stat-packets">1,420/s</span></div>
                </div>

                <div class="chart-card">
                    <div class="chart-header-row"><span>Execution Delay</span><span class="value-badge c-cyan" id="latency-txt">0.40 ms</span></div>
                    <div class="svg-container-frame">
                        <svg viewBox="0 0 300 7
