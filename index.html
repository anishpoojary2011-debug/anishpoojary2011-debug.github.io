<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>anish@production-node:~</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            --bg: #030712;
            --panel: #0b1329;
            --border: #1e293b;
            --cyan: #0ea5e9;
            --purple: #8b5cf6;
            --green: #10b981;
            --red: #ef4444;
            --text: #f1f5f9;
            --text-dim: #64748b;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* LIVE BACKGROUND MATRIX CANVAS ALTERNATIVE */
        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.15;
            display: none;
            pointer-events: none;
        }

        /* HARDWARE STATUS TOP ACCENT */
        .status-header-bar {
            width: 100%; height: 35px;
            background: #070d19;
            border-bottom: 1px solid var(--border);
            position: fixed; top: 0; left: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; font-size: 0.75rem; font-family: 'Fira Code', monospace;
            color: var(--text-dim); box-sizing: border-box;
        }

        .status-indicator {
            display: flex; align-items: center; gap: 8px;
        }

        .pulse-dot {
            width: 7px; height: 7px;
            background-color: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--green);
        }

        /* SPLIT SCREEN WORKSPACE LAYOUT */
        .workspace-grid {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 45px;
        }

        @media(min-width: 850px) {
            .workspace-grid {
                grid-template-columns: 1.1fr 0.9fr;
            }
        }

        /* IDE PLATFORM PANELS */
        .panel-box {
            background: rgba(11, 19, 41, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .panel-tab-bar {
            background: #070d19;
            padding: 0 10px;
            height: 35px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .tab-pill {
            background: #0b1329;
            color: var(--cyan);
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            padding: 5px 12px;
            border-radius: 6px 6px 0 0;
            border: 1px solid var(--border);
            border-bottom: none;
        }

        /* INTERACTIVE TERMINAL WINDOW */
        .terminal-viewport {
            padding: 15px;
            height: 350px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .terminal-viewport::-webkit-scrollbar { width: 5px; }
        .terminal-viewport::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .terminal-log-output {
            color: #cbd5e1;
            white-space: pre-wrap;
        }

        .input-row {
            display: flex;
            align-items: center;
            width: 100%;
            margin-top: 8px;
        }

        .terminal-prompt-tag {
            color: var(--purple);
            font-weight: bold;
            margin-right: 8px;
            white-space: nowrap;
        }

        .terminal-input-field {
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            width: 100%;
        }

        /* NEOFETCH ROW DESIGN */
        .neofetch-layout {
            display: flex; gap: 20px; margin: 10px 0; font-size: 0.8rem;
        }
        .neofetch-logo { color: var(--cyan); font-weight: bold; line-height: 1.2; }

        /* TELEMETRY METRIC FEED MODULES */
        .telemetry-stack {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chart-card {
            background: rgba(4, 7, 15, 0.5);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
        }

        .chart-header-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-family: 'Fira Code', monospace;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .value-badge {
            font-weight: bold;
            color: var(--text);
        }

        .canvas-render-frame {
            width: 100%;
            height: 65px;
            background: #02040a;
            border-radius: 4px;
            display: block;
        }

        .c-cyan { color: var(--cyan); }
        .c-purple { color: var(--purple); }
        .c-green { color: var(--green); }
        .c-red { color: var(--red); }
        .c-dim { color: var(--text-dim); }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="status-header-bar">
        <div class="status-indicator">
            <span class="pulse-dot"></span>
            <span>node_cluster_017@production</span>
        </div>
        <span id="system-clock-panel">00:00:00 PM</span>
    </div>

    <div class="workspace-grid" id="main-workspace">
        <div class="panel-box">
            <div class="panel-tab-bar"><div class="tab-pill">bash_terminal.sh</div></div>
            <div class="terminal-viewport" id="scroll-engine-box">
                <div class="terminal-log-output" id="console-log-history">Welcome to the real-time operational monitoring node grid.
Type <span class="c-cyan">'help'</span> to look up system instructions. Has history tracking (ArrowUp/Down).</div>
                <div class="input-row">
                    <span class="terminal-prompt-tag">anish@gateway:~$</span>
                    <input type="text" class="terminal-input-field" id="console-terminal-typer" autofocus autocomplete="off" placeholder="Execute operation..." inputmode="text">
                </div>
            </div>
        </div>

        <div class="panel-box">
            <div class="panel-tab-bar"><div class="tab-pill">telemetry_dashboard.conf</div></div>
            <div class="telemetry-stack">
                <div class="chart-card">
                    <div class="chart-header-row"><span>DOM Execution Delay</span><span class="value-badge c-cyan" id="latency-txt">0.0 ms</span></div>
                    <canvas id="canvas-latency-chart" class="canvas-render-frame" width="320" height="65"></canvas>
                </div>
                <div class="chart-card">
                    <div class="chart-header-row"><span>Allocated JS Memory Heap</span><span class="value-badge c-purple" id="heap-txt">0.00 MB</span></div>
                    <canvas id="canvas-heap-chart" class="canvas-render-frame" width="320" height="65"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const logHistory = document.getElementById('console-log-history');
        const terminalTyper = document.getElementById('console-terminal-typer');
        const scrollEngine = document.getElementById('scroll-engine-box');
        const clockPanel = document.getElementById('system-clock-panel');
        const mCanvas = document.getElementById('matrix-canvas');

        let latencyBuffer = Array(45).fill(1);
        let heapBuffer = Array(45).fill(20);
        let commandHistory = [];
        let historyIndex = -1;
        let matrixInterval = null;

        setInterval(() => {
            clockPanel.textContent = new Date().toLocaleTimeString();
        }, 1000);

        window.addEventListener('DOMContentLoaded', () => {
            launchLiveHardwareTelemetry();
            setupMatrixBackground();
        });

        function launchLiveHardwareTelemetry() {
            const latencyCanvas = document.getElementById('canvas-latency-chart');
            const heapCanvas = document.getElementById('canvas-heap-chart');
            if(!latencyCanvas || !heapCanvas) return;

            const lCtx = latencyCanvas.getContext('2d');
            const hCtx = heapCanvas.getContext('2d');

            setInterval(() => {
                let markStart = performance.now();
                for (let i = 0; i < 10000; i++) { let d = i * i; } 
                let markEnd = performance.now();
                let actualLatency = markEnd - markStart;

                let realHeapBytes = window.performance && performance.memory ? performance.memory.usedJSHeapSize : (22 * 1024 * 1024 + (Math.random() * 3 * 1024 * 1024));
                let heapMegabytes = realHeapBytes / (1024 * 1024);

                latencyBuffer.push(actualLatency); latencyBuffer.shift();
                heapBuffer.push(heapMegabytes); heapBuffer.shift();

                document.getElementById('latency-txt').innerText = actualLatency.toFixed(2) + ' ms';
                document.getElementById('heap-txt').innerText = heapMegabytes.toFixed(2) + ' MB';

                renderDynamicTelemetryPath(latencyCanvas, lCtx, latencyBuffer, '#0ea5e9', 6);
                renderDynamicTelemetryPath(heapCanvas, hCtx, heapBuffer, '#8b5cf6', 40);
            }, 300);
        }

        function renderDynamicTelemetryPath(canvasObj, ctxObj, dataPoints, strokeColor, maximumYScaleBound) {
            ctxObj.clearRect(0, 0, canvasObj.width, canvasObj.height);
            ctxObj.beginPath();
            ctxObj.strokeStyle = strokeColor;
            ctxObj.lineWidth = 2;
            let stepHorizontal = canvasObj.width / (dataPoints.length - 1);

            for (let idx = 0; idx < dataPoints.length; idx++) {
                let xCoordinate = idx * stepHorizontal;
                let computedPercentage = Math.min(1, dataPoints[idx] / maximumYScaleBound);
                let yCoordinate = canvasObj.height - (computedPercentage * canvasObj.height);
                
                if (idx === 0) ctxObj.moveTo(xCoordinate, yCoordinate); else ctxObj.lineTo(xCoordinate, yCoordinate);
            }
            ctxObj.stroke();
        }

        // MATRIX RENDERING SUB-ENGINE
        function setupMatrixBackground() {
            const ctx = mCanvas.getContext('2d');
            mCanvas.width = window.innerWidth;
            mCanvas.height = window.innerHeight;
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*()_+=";
            const fontSize = 14;
            const columns = mCanvas.width / fontSize;
            const rainDrops = Array.from({ length: columns }).fill(1);

            function draw() {
                ctx.fillStyle = 'rgba(3, 7, 18, 0.05)';
                ctx.fillRect(0, 0, mCanvas.width, mCanvas.height);
                ctx.fillStyle = '#10b981';
                ctx.font = fontSize + 'px monospace';

                for (let i = 0; i < rainDrops.length; i++) {
                    const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                    ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                    if (rainDrops[i] * fontSize > mCanvas.height && Math.random() > 0.975) {
                        rainDrops[i] = 0;
                    }
                    rainDrops[i]++;
                }
            }
            matrixInterval = setInterval(draw, 30);
        }

        const virtualFS = {
            "about.txt": `I am an experienced <span class="c-cyan">Discord Server Manager</span> and Community Infrastructure Architect.`,
            "skills.md": `- Discord Automation & Webhook Integration\n- Linux Bash Scripting Environments\n- Front-End Dashboard Interfaces`,
            "socials.env": `- Instagram: @__miku._.chan_\n- Discord: @anish\n- GitHub: anishpoojary2011-debug`,
            "motd.cap": `⚡ Mainframe Status: OPERATIONAL\nWelcome back, Administrator. Keep tracking system telemetry feeds safely.`
        };

        const binList = ['help', 'ls', 'cat', 'connect', 'clear', 'neofetch', 'sudo', 'ping', 'matrix', 'date'];

        terminalTyper.addEventListener('keydown', function(event) {
            // Tab Autocomplete
            if (event.key === 'Tab') {
                event.preventDefault();
                const currentInput = terminalTyper.value.trim().toLowerCase();
                if (!currentInput) return;
                const match = binList.find(cmd => cmd.startsWith(currentInput));
                if (match) terminalTyper.value = match;
            }

            // Command History Navigation
            if (event.key === 'ArrowUp') {
                event.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    terminalTyper.value = commandHistory[commandHistory.length - 1 - historyIndex];
                }
            } else if (event.key === 'ArrowDown') {
                event.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    terminalTyper.value = commandHistory[commandHistory.length - 1 - historyIndex];
                } else if (historyIndex === 0) {
                    historyIndex = -1;
                    terminalTyper.value = '';
                }
            }

            if (event.key === 'Enter') {
                const terminalRawLine = terminalTyper.value.trim();
                if (!terminalRawLine) return;

                logHistory.innerHTML += `\n<span class="c-purple">anish@gateway:~$</span> ${terminalRawLine}`;
                commandHistory.push(terminalRawLine);
                historyIndex = -1;
                terminalTyper.value = '';

                const components = terminalRawLine.split(' ');
                const baseOpcode = components[0].toLowerCase();
                const operationalParameter = components.slice(1).join(' ');

                if (baseOpcode === 'help') {
                    logHistory.innerHTML += `\nDirectives available:\n  <span class="c-cyan">ls</span>       - List virtual directory workspace layout maps\n  <span class="c-cyan">cat</span>      - Read text output data records inside targeted files\n  <span class="c-cyan">neofetch</span> - Pull comprehensive hardware architecture statistics\n  <span class="c-cyan">ping</span>     - Test signal execution echo responses\n  <span class="c-cyan">matrix</span>   - Toggle live matrix overlay backdrop stream state\n  <span class="c-cyan">sudo</span>     - Run instruction with elevated administrative clearance\n  <span class="c-cyan">date</span>     - Output active standard clock tracking time strings\n  <span class="c-cyan">connect</span>  - Forward directly to active Discord link\n  <span class="c-cyan">clear</span>    - Wipe active history logs out of viewport window`;
                } else if (baseOpcode === 'ls') {
                    logHistory.innerHTML += `\n` + Object.keys(virtualFS).map(file => `<span class="c-cyan">${file}</span>`).join('    ');
                } else if (baseOpcode === 'cat') {
                    if (virtualFS[operationalParameter.toLowerCase()]) {
                        logHistory.innerHTML += `\n` + virtualFS[operationalParameter.toLowerCase()];
                    } else {
                        logHistory.innerHTML += `\nFile not found. Usage example: <span class="c-cyan">cat about.txt</span>`;
                    }
                } else if (baseOpcode === 'neofetch') {
                    logHistory.innerHTML += `
<div class="neofetch-layout">
<div class="neofetch-logo">
  __ _ _ __ (_)___| |__  
 / _\` | '_ \\| / __| '_ \\ 
| (_| | | | | \\__ \\ | | |
 \\__,_|_| |_|_|___/_       |_|
</div>
<div>
<span class="c-cyan">anish@production-gateway</span><br>
-----------------------<br>
<span class="c-purple">OS:</span> Cyberpunk DashEngine v7.5<br>
<span class="c-purple">Kernel:</span> Webkit Web Performance Core API<br>
<span class="c-purple">Uptime:</span> Live Tracking Enabled<br>
<span class="c-purple">Shell:</span> Custom JS Terminal Mock Bash<br>
<span class="c-purple">Resolution:</span> Responsive Viewport Grid Layout
</div>
</div>`;
                } else if (baseOpcode === 'ping') {
                    logHistory.innerHTML += `\n64 bytes from 127.0.0.1: icmp_seq=1 ttl=64 time=0.45 ms\n64 bytes from 127.0.0.1: icmp_seq=2 ttl=64 time=0.38 ms\n--- 127.0.0.1 ping statistics ---`;
                } else if (baseOpcode === 'matrix') {
                    const currentStyle = window.getComputedStyle(mCanvas).display;
                    if(currentStyle === 'none') {
                        mCanvas.style.display = 'block';
                        logHistory.innerHTML += `\n<span class="c-green">Matrix stream activated successfully.</span>`;
                    } else {
                        mCanvas.style.display = 'none';
                        logHistory.innerHTML += `\n<span class="c-dim">Matrix stream disabled.</span>`;
                    }
                } else if (baseOpcode === 'sudo') {
                    if(!operationalParameter) {
                        logHistory.innerHTML += `\n<span class="c-red">sudo: missing target action instruction parameters.</span>`;
                    } else {
                        logHistory.innerHTML += `\n<span class="c-red">[sudo] password required for anish: </span>\nPermission override accepted. Processing: '${operationalParameter}'...`;
                    }
                } else if (baseOpcode === 'date') {
                    logHistory.innerHTML += `\n${new Date().toString()}`;
                } else if (baseOpcode === 'connect') {
                    logHistory.innerHTML += `\n🔗 Redirection protocol sequence verified. Connecting...`;
                    setTimeout(() => { window.location.href = "https://discord.gg/wwqtGYu7q"; }, 800);
                } else if (baseOpcode === 'clear') {
                    logHistory.innerHTML = 'Terminal history logs cleared.';
                } else {
                    logHistory.innerHTML += `\nbash: command not found: '${baseOpcode}'`;
                }

                scrollEngine.scrollTop = scrollEngine.scrollHeight;
            }
        });

        document.addEventListener('click', () => { terminalTyper.focus(); });
    </script>
</body>
</html>
